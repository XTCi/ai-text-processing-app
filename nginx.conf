# nginx.conf
#
# Serves the built React SPA and proxies /api/ requests to the backend
# service on Docker's internal network. Without this, fetch("/api/...")
# calls made by the frontend (see src/api/client.ts, src/hooks/useTaskPolling.ts)
# would hit nginx directly and get the SPA fallback / a 404 instead of
# reaching the FastAPI backend.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the backend service. proxy_buffering is disabled
    # so the SSE endpoint (GET /api/task/{taskId}/stream) streams tokens to
    # the client in real time instead of being buffered and flushed in one
    # chunk when the response completes.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # Client-side routing (React Router): fall back to index.html for any
    # path that isn't a real static asset, so refreshing e.g. /translate
    # doesn't 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
